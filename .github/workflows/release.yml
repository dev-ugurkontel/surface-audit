name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write # required for PyPI Trusted Publishing and sigstore

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0

      - uses: actions/setup-python@v5.2.0
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build cyclonedx-bom

      - name: Build wheel and sdist
        run: python -m build

      - name: Generate CycloneDX SBOM
        run: |
          python -m pip install -e .
          cyclonedx-py environment --output-format json --output-file dist/sbom.cdx.json

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4.4.0
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/surface-audit
    steps:
      - uses: actions/download-artifact@v4.1.8
        with:
          name: dist
          path: dist/

      - name: Publish via Trusted Publishing (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: false
          attestations: true

  sign-and-release:
    name: Sign artifacts and create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0

      - uses: actions/download-artifact@v4.1.8
        with:
          name: dist
          path: dist/

      - name: Sign distributions with sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: |
            ./dist/*.whl
            ./dist/*.tar.gz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "See CHANGELOG.md for details." \
            ./dist/*
